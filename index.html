<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación Fuentes de Energía - Grado 7</title>
<style>
:root{
  --azul:#123b70;
  --verde:#18824c;
  --fondo:#eef4f1;
  --texto:#111827;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(135deg,#eef4ff,#f2fff4);
  color:var(--texto);
  user-select:none;
}

header{
  background:linear-gradient(90deg,var(--azul),var(--verde));
  color:white;
  text-align:center;
  padding:26px 14px;
}

header h1{
  margin:0;
  font-size:32px;
}

header p{
  margin:8px 0 0;
}

.container{
  max-width:980px;
  margin:auto;
  padding:22px;
}

.card{
  background:white;
  border-radius:18px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.12);
}

input[type=text], select{
  width:100%;
  padding:14px;
  margin:8px 0 14px;
  border:1px solid #c8d0dc;
  border-radius:12px;
  font-size:16px;
}

button{
  background:var(--azul);
  color:white;
  border:0;
  border-radius:12px;
  padding:14px 24px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#0d2850;
}

.option{
  display:block;
  padding:15px;
  margin:10px 0;
  border:1px solid #d3dbea;
  border-radius:14px;
  background:#f8fbff;
  cursor:pointer;
}

.option:hover{
  background:#eaf2ff;
}

.hidden{
  display:none;
}

.progress{
  font-weight:bold;
  color:var(--verde);
  margin-bottom:10px;
}

.result{
  font-size:24px;
  font-weight:bold;
  color:var(--azul);
  text-align:center;
}
</style>
</head>
<body oncopy="return false" onpaste="return false" oncut="return false">

<header>
  <h1>Evaluación en línea</h1>
  <p>Fuentes de energía — Grado 7° | Tecnología e Informática | IE San Miguel</p>
</header>

<div class="container">

  <section class="card" id="datosCard">
    <h2>Datos del estudiante</h2>

    <input type="text" id="nombre" placeholder="Nombre completo">

    <select id="curso">
      <option value="">Seleccione el grado</option>
      <option value="7-1">7-1</option>
      <option value="7-2">7-2</option>
    </select>

    <button onclick="startQuiz()">Iniciar evaluación</button>
  </section>

  <section class="card hidden" id="quizCard">
    <div id="questionContainer"></div>
  </section>

  <section class="card hidden" id="resultCard">
    <div class="result" id="resultText"></div>
    <p id="studentText"></p>
  </section>

</div>

<script>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIuwpfKykrKwIPSdduhIdrg8kjVHz6ueXX4dyw5TEzgTBDn8oBbdiZAx4R34-ZtBr6/exec";

const questions = [

{
question:"La energía se define como:",
options:[
"Un material sólido utilizado en la industria.",
"La capacidad de producir movimiento, luz, calor o cambios en los cuerpos.",
"Un tipo de combustible fósil.",
"Un aparato para producir electricidad.",
"Una corriente de agua natural."
],
answer:1
},

{
question:"Las fuentes de energía son:",
options:[
"Máquinas para generar electricidad.",
"Recursos de la naturaleza de donde se obtiene energía.",
"Tipos de aparatos electrónicos.",
"Sistemas de transporte de energía.",
"Únicamente combustibles fósiles."
],
answer:1
},

{
question:"¿Cuál de las siguientes es una fuente de energía renovable?",
options:[
"Petróleo",
"Carbón",
"Uranio",
"Sol",
"Gas natural"
],
answer:3
},

{
question:"Las fuentes de energía renovables se caracterizan porque:",
options:[
"Son imposibles de utilizar.",
"Se regeneran naturalmente.",
"Tardan millones de años en formarse.",
"Son altamente contaminantes.",
"Solo existen en fábricas."
],
answer:1
}

];

let currentQuestion = 0;
let score = 0;
let selectedAnswers = [];

function mezclarArray(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
}

function startQuiz(){

  const nombre=document.getElementById("nombre").value.trim();
  const curso=document.getElementById("curso").value;

  if(!nombre || !curso){
    alert("Completa nombre y grado.");
    return;
  }

  mezclarArray(questions);

  questions.forEach(q=>{
    const correcta=q.options[q.answer];
    mezclarArray(q.options);
    q.answer=q.options.indexOf(correcta);
  });

  document.getElementById("datosCard").classList.add("hidden");
  document.getElementById("quizCard").classList.remove("hidden");

  showQuestion();
}

function showQuestion(){

  const q=questions[currentQuestion];

  let html=`
  <div class="progress">Pregunta ${currentQuestion+1} de ${questions.length}</div>
  <h2>${q.question}</h2>
  `;

  q.options.forEach((option,index)=>{

    html += `
    <label class="option">
      <input type="radio" name="option" value="${index}" onchange="nextQuestion()">
      ${String.fromCharCode(65+index)}. ${option}
    </label>
    `;

  });

  document.getElementById("questionContainer").innerHTML=html;
}

function nextQuestion(){

  const selected=document.querySelector('input[name="option"]:checked');

  if(!selected)return;

  const answer=Number(selected.value);

  const q=questions[currentQuestion];

  if(answer===q.answer){
    score++;
  }

  currentQuestion++;

  if(currentQuestion < questions.length){
    showQuestion();
  }else{
    finishQuiz();
  }
}

function enviarResultados(nombre,curso,puntaje,total,nota){

  const params=new URLSearchParams();

  params.set("nombre",nombre);
  params.set("curso",curso);
  params.set("puntaje",puntaje);
  params.set("total",total);
  params.set("nota",nota);

  fetch(APPS_SCRIPT_URL + "?" + params.toString())
  .catch(error=>console.log(error));
}

function finishQuiz(){

  document.getElementById("quizCard").classList.add("hidden");
  document.getElementById("resultCard").classList.remove("hidden");

  const total=questions.length;

  const nota=(1+(score/total)*9).toFixed(2);

  const nombre=document.getElementById("nombre").value.trim();

  const curso=document.getElementById("curso").value;

  enviarResultados(nombre,curso,score,total,nota);

  document.getElementById("resultText").innerHTML=`
  Puntaje: ${score} / ${total}<br>
  Nota final: ${nota} / 10
  `;

  document.getElementById("studentText").innerHTML=`
  Estudiante: ${nombre}<br>
  Curso: ${curso}
  `;
}

document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",function(e){

  const key=e.key.toLowerCase();

  if((e.ctrlKey||e.metaKey)&&["c","v","x","a","u"].includes(key)){
    e.preventDefault();
  }

  if(e.key==="F12"){
    e.preventDefault();
  }

});

</script>
</body>
</html>
```
